<body>

<header>
    <h1>🏦 Loan Approval Prediction System</h1>
    <p>Machine Learning Based Loan Eligibility Checker</p>
</header>

<div class="container">

    <div class="card">

        <h2>Loan Application Form</h2>

        <label>Applicant Name</label>
        <input type="text" id="name" placeholder="Enter Applicant Name">

        <label>Gender</label>
        <select id="gender">
            <option>Male</option>
            <option>Female</option>
        </select>

        <label>Married</label>
        <select id="married">
            <option>Yes</option>
            <option>No</option>
        </select>

        <label>Education</label>
        <select id="education">
            <option>Graduate</option>
            <option>Not Graduate</option>
        </select>

        <label>Self Employed</label>
        <select id="selfemp">
            <option>No</option>
            <option>Yes</option>
        </select>

        <label>Applicant Income</label>
        <input type="number" id="income" placeholder="Enter Income">

        <label>Loan Amount</label>
        <input type="number" id="loan" placeholder="Enter Loan Amount">

        <label>Credit History</label>
        <select id="credit">
            <option>Good</option>
            <option>Bad</option>
        </select>

        <label>Property Area</label>
        <select id="property">
            <option>Urban</option>
            <option>Semi Urban</option>
            <option>Rural</option>
        </select>

        <button onclick="predictLoan()">
            Predict Loan
        </button>

    </div>

    <div class="card">

        <h2>Prediction Result</h2>

        <div id="resultBox">

            <h1 id="output">
                Waiting for Prediction...
            </h1>

            <p id="message">
                Fill the application form and click Predict Loan.
            </p>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
